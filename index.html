<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgencyOS // Dice Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .triangle-dice-red { width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent; border-bottom: 35px solid #dc2626; position: relative; }
        .triangle-dice-blue { width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent; border-bottom: 35px solid #2563eb; position: relative; }
        .triangle-text { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); color: #fff; font-weight: 900; }
    </style>
</head>
<body class="bg-[#faf9f6] text-neutral-900 min-h-screen font-mono p-4">

    <div class="max-w-4xl mx-auto flex flex-col md:flex-row gap-6">
        <!-- 左侧：控制台 -->
        <div class="w-full md:w-1/3 space-y-4">
            <h1 class="font-black">▲ AgencyOS // DICE</h1>
            <input type="text" id="username" placeholder="特工代号" onchange="saveProfile()" class="w-full border-2 border-neutral-900 p-2">
            <button onclick="rollAgencyDice()" class="w-full bg-red-600 text-white font-black py-4 uppercase hover:bg-red-700">执行投掷</button>
            <div id="status-tag" class="text-[10px] font-bold uppercase p-2 border border-neutral-300 inline-block">OFFLINE</div>
        </div>

        <!-- 右侧：日志区 (默认展示所有数据) -->
        <div id="log-container" class="w-full md:w-2/3 space-y-4 min-h-[500px]"></div>
    </div>

    <script>
        const supabase = supabase.createClient("https://egtudzuaahkknlvfzgrb.supabase.co", "sb_publishable_beFak4osOEoXcoK668rFpA_t6Vki5Ol");
        
        // 核心：UID 隔离，彻底解决重名问题
        let userID = localStorage.getItem('agency_uid') || Math.random().toString(36).substring(2);
        localStorage.setItem('agency_uid', userID);
        let myName = localStorage.getItem('agency_nick') || "未命名特工";

        function saveProfile() { myName = document.getElementById('username').value || "未命名特工"; localStorage.setItem('agency_nick', myName); }

        function renderLogs() {
            const container = document.getElementById('log-container');
            const history = JSON.parse(localStorage.getItem('agency_history') || "[]");
            container.innerHTML = history.length === 0 ? '<div class="text-neutral-400">终端空闲...</div>' : history.map(d => `
                <div class="p-4 border-2 border-neutral-900 bg-white">
                    <div class="font-bold text-xs mb-2">${d.sender}</div>
                    <div class="flex gap-2">${d.rolls.map(r => `<div class="${d.type==='reality'?'triangle-dice-red':'triangle-dice-blue'}"><span class="triangle-text">${r}</span></div>`).join('')}</div>
                </div>
            `).join('');
        }

        // 监听插入，直接渲染，完全不使用 sys_log
        supabase.channel('public:agency_rolls').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'agency_rolls' }, payload => {
            const data = payload.new.payload;
            // 只要 UID 不同就接收，不管名字是不是重名
            if (data.uid !== userID) {
                const h = JSON.parse(localStorage.getItem('agency_history') || "[]");
                h.unshift(data);
                localStorage.setItem('agency_history', JSON.stringify(h.slice(0, 20)));
                renderLogs();
            }
        }).subscribe(status => {
            document.getElementById('status-tag').innerText = status === 'SUBSCRIBED' ? "ONLINE" : "OFFLINE";
        });

        async function rollAgencyDice() {
            const data = {
                uid: userID,
                sender: myName,
                rolls: Array.from({length: 6}, () => Math.floor(Math.random() * 4) + 1),
                type: 'reality'
            };
            const h = JSON.parse(localStorage.getItem('agency_history') || "[]");
            h.unshift(data);
            localStorage.setItem('agency_history', JSON.stringify(h.slice(0, 20)));
            renderLogs();
            await supabase.from('agency_rolls').insert([{ payload: data }]);
        }

        document.getElementById('username').value = myName;
        renderLogs();
    </script>
</body>
</html>
