<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AgencyOS - Triangle Agency Dice Pool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        .agency-bg-light { background-color: #faf9f6; background-image: linear-gradient(rgba(220, 38, 38, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(220, 38, 38, 0.02) 1px, transparent 1px); background-size: 20px 20px; }
        .dark .agency-bg-dark { background-color: #0c0505; background-image: linear-gradient(rgba(220, 38, 38, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(220, 38, 38, 0.03) 1px, transparent 1px); background-size: 20px 20px; }
        .triangle-dice-red { width: 0; height: 0; border-left: 22px solid transparent; border-right: 22px solid transparent; border-bottom: 38px solid #dc2626; position: relative; }
        .triangle-dice-blue { width: 0; height: 0; border-left: 22px solid transparent; border-right: 22px solid transparent; border-bottom: 38px solid #2563eb; position: relative; }
        .triangle-text { position: absolute; top: 14px; left: 50%; transform: translateX(-50%); color: #fff; font-weight: 900; font-size: 16px; }
    </style>
</head>
<body id="main-body" class="agency-bg-light text-neutral-900 min-h-screen flex flex-col font-mono selection:bg-red-600 selection:text-white transition-colors duration-300">

    <header class="border-b-2 border-neutral-900 bg-white dark:bg-neutral-950 px-6 py-4 flex justify-between items-center transition-colors">
        <h1 class="text-sm font-black uppercase tracking-widest text-neutral-900 dark:text-red-500">▲ AgencyOS // Public Terminal</h1>
        <button onclick="toggleTheme()" id="theme-btn" class="text-[10px] bg-neutral-100 dark:bg-neutral-900 text-neutral-600 dark:text-neutral-400 px-3 py-1 border border-neutral-300 dark:border-neutral-800 rounded">切换模式</button>
    </header>

    <main class="flex-1 max-w-6xl w-full mx-auto p-4 md:p-6 flex flex-col md:flex-row gap-6">
        <div class="w-full md:w-1/2 flex flex-col gap-6">
            <div class="bg-white dark:bg-neutral-950 border-2 border-neutral-900 rounded p-6 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                <input type="text" id="username" placeholder="输入特工代号..." onchange="saveProfile()" class="w-full bg-neutral-50 dark:bg-black border border-neutral-300 dark:border-neutral-800 rounded px-3 py-2 text-sm mb-4">
                <button onclick="rollAgencyDice()" class="w-full bg-red-600 text-white font-black py-5 rounded text-lg uppercase border-b-4 border-red-800 active:border-b-0 hover:bg-red-500 transition">执行投掷</button>
                <div class="mt-4 text-center">
                    <label class="text-xs text-neutral-500 cursor-pointer"><input type="checkbox" id="is-secret" class="mr-2"> 暗骰：仅自己可见</label>
                </div>
            </div>
        </div>

        <div class="w-full md:w-1/2 flex flex-col bg-white dark:bg-neutral-950 border-2 border-neutral-900 rounded p-6 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] h-[500px]">
            <div id="log-container" class="flex-1 overflow-y-auto space-y-4 pr-2"></div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = "https://egtudzuaahkknlvfzgrb.supabase.co";
        const SUPABASE_KEY = "sb_publishable_beFak4osOEoXcoK668rFpA_t6Vki5Ol";
        const STORAGE_KEY = "agency_dice_history_v20";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let userID = localStorage.getItem('agency_uid') || Math.random().toString(36).substring(2);
        localStorage.setItem('agency_uid', userID);
        let myName = localStorage.getItem('agency_nick') || "特工";

        function saveProfile() { myName = document.getElementById('username').value || "特工"; localStorage.setItem('agency_nick', myName); }

        function toggleTheme() {
            document.body.classList.toggle('dark');
            document.body.className = document.body.classList.contains('dark') ? "agency-bg-dark text-gray-100 min-h-screen flex flex-col font-mono dark" : "agency-bg-light text-neutral-900 min-h-screen flex flex-col font-mono";
        }

        function renderAllLogs() {
            const container = document.getElementById('log-container');
            const history = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
            if (history.length === 0) { container.innerHTML = '<div class="text-neutral-400 text-center py-12 text-sm">终端空闲，等待指令...</div>'; return; }
            container.innerHTML = history.map(data => `
                <div class="p-4 rounded border-2 border-neutral-900 bg-white dark:bg-black text-sm">
                    <div class="font-bold mb-2">${data.sender}</div>
                    <div class="flex gap-2 my-2">${data.rolls.map(r => `<div class="${data.rollType==='reality'?'triangle-dice-red':'triangle-dice-blue'}"><span class="triangle-text">${r}</span></div>`).join('')}</div>
                    <div class="font-black text-xs ${data.isSuccess?'text-red-600':'text-neutral-500'}">${data.isSuccess?'SUCCESS':'FAILURE'}</div>
                </div>
            `).join('');
        }

        supabase.channel('public:agency_rolls').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'agency_rolls' }, payload => {
            const data = payload.new.payload;
            if (data.uid !== userID && !data.isSecret) {
                const history = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
                history.unshift(data);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(history.slice(0, 40)));
                renderAllLogs();
            }
        }).subscribe();

        async function rollAgencyDice() {
            const rolls = Array.from({length: 6}, () => Math.floor(Math.random() * 4) + 1);
            const data = { id: Date.now(), uid: userID, sender: myName, rolls, rollType: document.querySelector('input[name="roll-type"]')?.value || 'reality', isSuccess: rolls.filter(r => r === 3).length >= 1, isSecret: document.getElementById('is-secret').checked };
            
            if (!data.isSecret) {
                const history = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
                history.unshift(data);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(history.slice(0, 40)));
                await supabase.from('agency_rolls').insert([{ id: data.id, payload: data }]);
            }
            renderAllLogs();
        }

        document.getElementById('username').value = myName;
        renderAllLogs();
    </script>
</body>
</html>
