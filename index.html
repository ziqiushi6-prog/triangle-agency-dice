<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AgencyOS // Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .agency-bg-light { background-color: #faf9f6; background-image: linear-gradient(rgba(220, 38, 38, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(220, 38, 38, 0.02) 1px, transparent 1px); background-size: 20px 20px; }
        .triangle-dice-red { width: 0; height: 0; border-left: 22px solid transparent; border-right: 22px solid transparent; border-bottom: 38px solid #dc2626; position: relative; }
        .triangle-dice-blue { width: 0; height: 0; border-left: 22px solid transparent; border-right: 22px solid transparent; border-bottom: 38px solid #2563eb; position: relative; }
        .triangle-text { position: absolute; top: 14px; left: 50%; transform: translateX(-50%); color: #fff; font-weight: 900; font-size: 16px; }
    </style>
</head>
<body id="main-body" class="agency-bg-light text-neutral-900 min-h-screen flex flex-col font-mono">

    <header class="border-b-2 border-neutral-900 px-6 py-4 flex justify-between items-center">
        <h1 class="text-md font-black">▲ AgencyOS // 骰池终端</h1>
        <div id="status-tag" class="text-xs px-2 py-1 bg-amber-500/10 text-amber-600 border border-amber-500/30 rounded font-bold">CONNECTING...</div>
    </header>

    <main class="max-w-4xl w-full mx-auto p-6 flex flex-col gap-6">
        <div class="bg-white border-2 border-neutral-900 p-6 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
            <input type="text" id="username" placeholder="输入特工代号..." onchange="localStorage.setItem('agency_nick', this.value)" class="w-full border-2 border-neutral-900 p-2 mb-4">
            <button onclick="rollAgencyDice()" class="w-full bg-red-600 text-white font-black py-4 uppercase border-b-4 border-red-800 active:border-b-0">执行投掷</button>
        </div>

        <div id="log-container" class="space-y-4"></div>
    </main>

    <script>
        const SUPABASE_URL = "https://egtudzuaahkknlvfzgrb.supabase.co";
        const SUPABASE_KEY = "sb_publishable_beFak4osOEoXcoK668rFpA_t6Vki5Ol";
        const STORAGE_KEY = "agency_dice_history_v20";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let myName = localStorage.getItem('agency_nick') || "特工";

        // 核心渲染逻辑：强制读取最新 Storage
        function renderLogs() {
            const container = document.getElementById('log-container');
            const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
            
            if (data.length === 0) {
                container.innerHTML = '<div class="text-center py-12 text-neutral-400">暂无终端记录...</div>';
                return;
            }

            container.innerHTML = data.map(item => `
                <div class="p-4 border-2 border-neutral-900 bg-white">
                    <div class="font-bold">${item.sender}</div>
                    <div class="flex gap-2 my-2">${item.rolls.map(r => `<div class="triangle-dice-${item.rollType === 'reality' ? 'red' : 'blue'}"><span class="triangle-text">${r}</span></div>`).join('')}</div>
                    <div class="text-xs">判定：${item.isSuccess ? '成功' : '失败'}</div>
                </div>
            `).join('');
        }

        // 核心同步逻辑：监听广播
        supabase.channel('public:agency_rolls').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'agency_rolls' }, payload => {
            const data = payload.new.payload;
            if (data.sender !== myName) {
                const history = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
                history.unshift(data);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(history.slice(0, 40)));
                renderLogs();
            }
        }).subscribe(status => {
            if (status === 'SUBSCRIBED') document.getElementById('status-tag').innerText = "ONLINE // 在线";
        });

        async function rollAgencyDice() {
            const rolls = Array.from({length: 6}, () => Math.floor(Math.random() * 4) + 1);
            const data = {
                id: Date.now(),
                sender: document.getElementById('username').value || "特工",
                rolls: rolls,
                rollType: document.querySelector('input[type="radio"]:checked')?.value || 'reality',
                isSuccess: rolls.filter(r => r === 3).length >= 1
            };
            
            const history = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
            history.unshift(data);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(history.slice(0, 40)));
            renderLogs();
            await supabase.from('agency_rolls').insert([{ id: data.id, payload: data }]);
        }

        // 启动时强制同步：移除了 onload 依赖，改为脚本加载立即执行
        renderLogs();
        document.getElementById('username').value = myName;
    </script>
</body>
</html>
